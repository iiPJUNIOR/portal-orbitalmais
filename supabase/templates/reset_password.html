<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f7; color: #333; margin: 0; padding: 0; }
    .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .card { background-color: #ffffff; border-radius: 24px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e1e1e8; }
    .header { text-align: center; margin-bottom: 30px; }
    .logo { height: 45px; width: auto; display: inline-block; border: 0; outline: none; text-decoration: none; }
    .title { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 15px; text-align: center; }
    .text { font-size: 16px; line-height: 1.6; color: #666; margin-bottom: 30px; text-align: center; }
    .button-container { text-align: center; }
    .button { background-color: #7c3aed; color: #ffffff !important; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; display: inline-block; }
    .footer { text-align: center; font-size: 12px; color: #999; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <img src="https://brbqsbvuitdxrtzqyopj.supabase.co/storage/v1/object/public/public-assets/logo.png" alt="Control iD" height="45" border="0" class="logo">
      </div>
      <h1 class="title">Recuperar Senha</h1>
      <p class="text">
        Olá! Recebemos uma solicitação para redefinir sua senha. Clique no botão abaixo para prosseguir:
      </p>
      <div class="button-container">
        <a href="{{ .ConfirmationURL }}" class="button">Redefinir Minha Senha</a>
      </div>
    </div>
    <div class="footer">&copy; Control iD - Inovação Brasileira</div>
  </div>
</body>
</html>
