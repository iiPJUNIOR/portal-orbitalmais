<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-BR">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Confirmação de Cadastro - Control iD</title>
  <style type="text/css">
    body { font-family: Arial, sans-serif; background-color: #f4f4f7; color: #333333; margin: 0; padding: 0; }
    .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
    .card { background-color: #ffffff; border-radius: 12px; padding: 30px; border: 1px solid #e1e1e8; }
    .header { text-align: center; margin-bottom: 25px; }
    .title { font-size: 20px; font-weight: bold; color: #1a1a1a; margin-bottom: 10px; text-align: center; }
    .text { font-size: 15px; line-height: 1.5; color: #666666; margin-bottom: 25px; text-align: center; }
    .button-container { text-align: center; }
    .button { background-color: #7c3aed; color: #ffffff !important; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px; display: inline-block; }
    .footer { text-align: center; font-size: 11px; color: #999999; margin-top: 25px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <img src="https://brbqsbvuitdxrtzqyopj.supabase.co/storage/v1/object/public/public-assets/logo.png" alt="Control iD" height="40" style="display: block; margin: 0 auto;" />
      </div>
      <h1 class="title">Verifique seu e-mail</h1>
      <p class="text">
        Falta pouco! Clique no botão abaixo para confirmar seu cadastro no <strong>Gerador de Propostas Control iD</strong> e começar a utilizar o sistema.
      </p>
      <div class="button-container">
        <a href="{{ .ConfirmationURL }}" class="button">Confirmar meu cadastro</a>
      </div>
    </div>
    <div class="footer">
      Esta é uma mensagem automática da Control iD.<br />
      &copy; Control iD - Inovação Brasileira
    </div>
